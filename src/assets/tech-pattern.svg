
<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Circuit lines -->
  <line x1="10" y1="50" x2="40" y2="50" stroke="currentColor" stroke-width="1"/>
  <line x1="60" y1="50" x2="90" y2="50" stroke="currentColor" stroke-width="1"/>
  <line x1="50" y1="10" x2="50" y2="40" stroke="currentColor" stroke-width="1"/>
  <line x1="50" y1="60" x2="50" y2="90" stroke="currentColor" stroke-width="1"/>
  
  <!-- Connection nodes -->
  <circle cx="50" cy="50" r="4" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="10" cy="50" r="2" fill="currentColor"/>
  <circle cx="90" cy="50" r="2" fill="currentColor"/>
  <circle cx="50" cy="10" r="2" fill="currentColor"/>
  <circle cx="50" cy="90" r="2" fill="currentColor"/>

  <!-- Diagonal connections -->
  <line x1="10" y1="10" x2="30" y2="30" stroke="currentColor" stroke-width="0.5"/>
  <line x1="70" y1="70" x2="90" y2="90" stroke="currentColor" stroke-width="0.5"/>
  <line x1="90" y1="10" x2="70" y2="30" stroke="currentColor" stroke-width="0.5"/>
  <line x1="30" y1="70" x2="10" y2="90" stroke="currentColor" stroke-width="0.5"/>
  
  <!-- Small nodes -->
  <circle cx="10" cy="10" r="1.5" fill="currentColor"/>
  <circle cx="90" cy="90" r="1.5" fill="currentColor"/>
  <circle cx="90" cy="10" r="1.5" fill="currentColor"/>
  <circle cx="10" cy="90" r="1.5" fill="currentColor"/>

  <!-- Dashed paths -->
  <path d="M30,30 Q50,10 70,30" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
  <path d="M30,70 Q50,90 70,70" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
</svg>
